{% extends "base.html" %}

{% block title %}
Productos
{% endblock %}

{% block content %}

<section>

    <h1>Productos</h1>

    {% for producto in productos %}

        <article>

            <img>

            <h2>{{ producto.nombre }}</h2>

            <p>{{ producto.marca }}</p>

            <p>{{ producto.precio_venta }}</p>

            <a href="#">Ver producto</a>

        </article>

    {% empty %}

        <p>No hay productos disponibles.</p>

    {% endfor %}

</section>

{% endblock %}
