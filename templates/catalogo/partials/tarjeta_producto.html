<article class="producto">

    <figure>

        {% if producto.imagen_principal %}
            <img 
                src="{{ producto.imagen_principal.imagen.url }}" 
                alt="{{ producto.imagen_principal.texto_alternativo }}"
            >
        {% endif %}
        
    </figure>

    <h2>

        {{ producto.nombre }}

    </h2>

    <p>

        {{ producto.marca.nombre }}

    </p>

    <p>

        ${{ producto.precio_venta }}

    </p>

    <a href="{% url 'catalogo:detalle_producto' producto.pk %}">

        Ver producto

    </a>

</article>
