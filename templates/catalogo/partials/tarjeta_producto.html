<article class="producto">

    <figure>

        {% with imagen=producto.imagenes.all|first %}
            {% if imagen %}
                <img 
                    src="{{ imagen.imagen.url }}" 
                    alt="{{ producto.nombre }}"
                >
            {% endif %}
        {% endwith%}

    </figure>

    <h2>

        {{ producto.nombre }}

    </h2>

    <p>

        {{ producto.marca.nombre }}

    </p>

    <p>

        ${{ producto.precio_venta }}

    </p>

    <a href="#">

        Ver producto

    </a>

</article>
